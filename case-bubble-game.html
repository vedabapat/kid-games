<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Case Game</title>
    <style>
        body { font-family: 'Comic Sans MS', sans-serif; background: #f5f3ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .window { width: 100%; max-width: 390px; text-align: center; background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .bubble-card { width: 150px; height: 150px; background: #60a5fa; color: white; font-size: 72px; font-weight: bold; border-radius: 50%; display: inline-flex; justify-content: center; align-items: center; margin: 30px 0; box-shadow: 0 8px 0 #2563eb; }
        .btn-large { display: block; width: 100%; background: #a855f7; color: white; border: none; font-size: 26px; padding: 15px; border-radius: 16px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="window">
        <div>Shop Balance: ⭐ <span id="stars-track">0</span></div>
        <div class="bubble-card" id="bubble-char">G</div>
        <button class="btn-large" onclick="checkCase(true)">UPPERCASE</button>
        <button class="btn-large" style="background:#ec4899;" onclick="checkCase(false)">lowercase</button>
    </div>

    <script>
        let isUpper = true, currentLetter = 'A', stars = 0;
        function speak(text) { window.speechSynthesis.speak(new SpeechSynthesisUtterance(text)); }
        
        function nextLetter() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            currentLetter = chars[Math.floor(Math.random() * chars.length)];
            isUpper = currentLetter === currentLetter.toUpperCase();
            document.getElementById('bubble-char').innerText = currentLetter;
            speak(isUpper ? "Is this an uppercase letter?" : "Is this a lowercase letter?");
        }

        function checkCase(selectedUpper) {
            if (selectedUpper === isUpper) {
                speak("Correct answer!");
                stars += 2;
                document.getElementById('stars-track').innerText = stars;
                nextLetter();
            } else {
                speak("Look closely! Try again!");
            }
        }
        window.onload = nextLetter;
    </script>
</body>
</html>
